server:
  port: 8083

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/LOANDB
    username: system
    password: loanapp123
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        connection:
          autocommit: false
  artemis:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin123
  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

messaging:
  queues:
    assessment-result: credit-assessments
    decision-reply: loan.decision.reply
  outbox:
    poll-interval-ms: 5000