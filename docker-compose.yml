services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  activemq:
    image: apache/activemq-artemis:2.31.2
    container_name: lp-activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin123

  postgres:
    image: pgvector/pgvector:pg16
    container_name: lp-postgres
    environment:
      POSTGRES_DB: loanapp
      POSTGRES_USER: loanapp
      POSTGRES_PASSWORD: loanapp123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U loanapp" ]
      interval: 5s
      timeout: 5s
      retries: 10

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lp-sqlserver
    environment:
      SA_PASSWORD: "LoanApp@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'LoanApp@123' -Q 'SELECT 1' -No" ]
      interval: 10s
      timeout: 5s
      retries: 10

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: lp-oracle
    environment:
      ORACLE_PASSWORD: loanapp123
      ORACLE_DATABASE: LOANDB
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 30s
      timeout: 10s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@loanapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  oracle_data: